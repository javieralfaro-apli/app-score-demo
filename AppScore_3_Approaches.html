<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Score — 3 Summary Approaches (HM Workspace)</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1B5BD8;
      --primary-light: #146FEB;
      --primary-dark: #213AB9;
      --success: #008556;
      --success-light: #E5F5EF;
      --success-dark: #00572D;
      --warning: #C25604;
      --warning-light: #FDF3E7;
      --warning-dark: #8B2800;
      --error: #9C0909;
      --error-light: #FDEAEA;
      --info: #0A4E9A;
      --info-light: #E8F2FA;
      --info-main: #0A4E9A;
      --informational: #058194;
      --informational-light: #DFEAEC;
      --informational-dark: #035C69;
      --ai: #775FEC;
      --ai-light: #ECE9FA;
      --ai-dark: #3C1487;
      --text-primary: rgba(0,0,0,0.87);
      --text-secondary: rgba(0,0,0,0.67);
      --text-disabled: rgba(0,0,0,0.38);
      --paper: #FFFFFF;
      --bg: #EFF2F3;
      --border: #E0E0E0;
      --grey100: #F5F5F5;
      --grey200: #EEEEEE;
      --grey300: #E0E0E0;
      --grey400: #BDBDBD;
      --grey700: #616161;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      color: var(--text-primary);
      padding: 40px 20px;
    }

    /* ── Page header ── */
    .page-header {
      max-width: 1400px; margin: 0 auto 40px; text-align: center; color: #fff;
    }
    .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
    .page-header p { font-size: 14px; opacity: 0.55; max-width: 680px; margin: 0 auto; line-height: 1.6; }

    /* ── Grid ── */
    .phones-grid {
      display: flex; gap: 40px; justify-content: center;
      max-width: 1400px; margin: 0 auto; flex-wrap: wrap;
    }
    .phone-wrapper { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    /* Label above phone */
    .phone-label-block { text-align: center; }
    .approach-tag {
      display: inline-block; padding: 3px 10px; border-radius: 12px; margin-bottom: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .approach-tag.conservative  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .approach-tag.medium        { background: rgba(10,78,154,0.25); color: #7AADF5; }
    .approach-tag.maximum       { background: rgba(119,95,236,0.25); color: #B8A9F8; }
    .approach-tag.exploration   { background: rgba(0,133,86,0.25); color: #4DC99A; }
    .phone-label { color: #fff; font-size: 16px; font-weight: 700; }

    /* Note below phone */
    .phone-note {
      max-width: 340px; text-align: center;
      font-size: 12px; line-height: 1.55; color: rgba(255,255,255,0.45);
      padding: 10px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }
    .phone-note strong { color: rgba(255,255,255,0.7); font-weight: 600; }

    /* ── Phone shell ── */
    .phone {
      width: 375px;
      background: var(--bg);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.5);
    }

    /* Status bar */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px 4px; font-size: 12px; font-weight: 600;
      color: var(--text-primary); background: var(--paper);
    }

    /* App bar — iCIMS logo + hamburger */
    .app-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 24px 16px; background: var(--paper);
    }
    .app-bar-logo { flex: 1; display: flex; align-items: center; }
    .app-bar-logo img { height: 22px; width: auto; display: block; }
    .app-bar-menu {
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; flex-direction: column; justify-content: center; gap: 4px;
      cursor: pointer;
    }
    .app-bar-menu span {
      display: block; height: 2px; background: var(--text-primary); border-radius: 1px;
    }
    .app-bar-menu span:first-child { width: 100%; }
    .app-bar-menu span:nth-child(2) { width: 100%; }
    .app-bar-menu span:last-child  { width: 100%; }

    /* Breadcrumb bar — back chevron + job title + prev/next */
    .breadcrumb-bar {
      display: flex; align-items: center;
      padding: 8px; background: var(--paper);
      border-top: 1px solid var(--grey200);
      border-bottom: 1px solid var(--grey200);
    }
    .breadcrumb-back {
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .breadcrumb-back svg { display: block; }
    .breadcrumb-title {
      flex: 1; font-size: 14px; font-weight: 600; color: var(--text-primary);
      letter-spacing: 0.25px; line-height: 1.43; padding: 0 4px;
    }
    .breadcrumb-nav {
      display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    }
    .breadcrumb-nav-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer; color: var(--text-primary);
    }
    .breadcrumb-nav-count {
      font-size: 14px; color: var(--text-secondary); letter-spacing: 0.16px;
      white-space: nowrap; padding: 0 2px;
    }

    /* ── Candidate header card ── */
    /* Figma: rounded-tl-[12px] rounded-tr-[12px] on top, rounded-bl-[12px] rounded-br-[12px] on bottom */
    .profile-header {
      background: var(--paper);
      border-radius: 12px;
      overflow: hidden;
      margin: 8px 16px 0;
    }
    /* Figma: pt-[24px] px-[16px] pb-[8px] */
    .profile-header-top {
      padding: 24px 16px 8px;
    }
    /* Figma: px-[8px] inside top, name is SemiBold 24px #0A4E9A */
    .profile-name {
      font-size: 24px; font-weight: 600; color: var(--info);
      letter-spacing: 0.4px; line-height: 1.2;
      padding: 0 8px;
    }
    /* Figma: px-[16px] pb-[16px] gap-[8px] */
    .profile-header-bottom {
      padding: 0 16px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    /* Chip row: chip in w-[180px] container, clock in flex-1 with px-[8px] py-[4px] */
    .profile-chip-row {
      display: flex; align-items: center; gap: 10px;
    }
    .profile-chip-wrap {
      width: 180px; display: flex; align-items: center; flex-shrink: 0;
    }
    .profile-stage-chip {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 4px;
      font-size: 14px; font-weight: 400; letter-spacing: 0.16px; line-height: 1.29;
      background: rgba(0,0,0,0.08); color: var(--text-primary);
      white-space: nowrap;
    }
    /* Clock cell: px-[8px] py-[4px] flex-1 */
    .profile-time-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--text-primary); letter-spacing: 0.25px; line-height: 1.43;
      padding: 4px 8px; flex: 1;
    }
    .profile-time-badge svg { flex-shrink: 0; }
    /* Contact row: Figma shows email flex-1, phone w-[130px], both h-[28px], 14px blue */
    .profile-contact-row {
      display: flex; align-items: center; gap: 16px;
    }
    .profile-contact-item {
      display: flex; align-items: center; gap: 8px;
      height: 28px; color: var(--primary);
      font-size: 14px; letter-spacing: 0.25px; line-height: 1.43;
      overflow: hidden;
    }
    .profile-contact-item.flex-1 { flex: 1; min-width: 0; }
    .profile-contact-item.fixed { width: 130px; flex-shrink: 0; }
    .profile-contact-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .profile-contact-item svg { flex-shrink: 0; }
    /* Triangle: Figma shows pb-[8px] wrapper, h-[18px] container */
    .profile-score-triangle-wrap {
      padding-bottom: 8px; width: 100%;
    }
    .profile-score-triangle {
      width: 100%; height: 18px; position: relative;
    }
    .profile-score-triangle::before {
      content: ''; position: absolute; inset: 0;
      background: var(--ai);
      clip-path: polygon(0% 100%, 100% 0%, 100% 100%);
    }
    /* Conservative: extra bottom pad since no fused card below */
    .profile-header-bottom.has-padding {
      padding-bottom: 8px;
    }
    /* ── AI Summary card — fused inside header (approaches 2 & 3) ── */
    /* Figma: bg-[#ece9fa] pl-[8px] pr-[16px] py-[16px] gap-[8px] rounded-[12px] */
    .ai-summary-card {
      background: var(--ai-light);
      margin: 8px 16px 0;
      border-radius: 12px;
      padding: 16px 16px 16px 8px;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .ai-summary-card.fused {
      margin: 0;
      border-radius: 12px;
      padding: 16px 16px 16px 8px;
    }
    .ai-summary-card .spark-col { flex-shrink: 0; padding-top: 2px; }
    .ai-summary-card .summary-body { flex: 1; }
    .ai-summary-card .summary-text {
      font-size: 14px; line-height: 1.55; color: var(--text-primary);
    }
    .ai-summary-card .summary-text strong { font-weight: 700; }

    /* Feedback row — below summary */
    .feedback-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid rgba(119,95,236,0.15);
    }
    .feedback-label { font-size: 12px; color: var(--text-secondary); flex: 1; }
    .fb-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(119,95,236,0.25);
      background: rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.15s;
    }
    .fb-btn:hover { background: #fff; color: var(--ai); border-color: var(--ai); }
    .fb-btn.active-up   { background: var(--success-light); color: var(--success); border-color: var(--success); }
    .fb-btn.active-down { background: var(--error-light); color: var(--error); border-color: var(--error); }

    /* Follow-up prompt (appears after thumbs tap) */
    .feedback-followup {
      margin-top: 10px; padding: 10px 12px;
      background: #fff; border-radius: 8px;
      border: 1px solid rgba(119,95,236,0.2);
      display: none;
    }
    .feedback-followup.visible { display: block; }
    .feedback-followup p {
      font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;
    }
    .followup-comment {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid var(--grey300); font-family: inherit;
      font-size: 12px; color: var(--text-primary); resize: none;
      background: var(--grey100); outline: none; line-height: 1.45;
      transition: border-color 0.15s;
    }
    .followup-comment:focus { border-color: var(--ai); background: #fff; }
    .followup-comment::placeholder { color: var(--text-disabled); }
    .followup-submit {
      margin-top: 8px; padding: 7px 16px; border-radius: 6px;
      border: none; background: var(--ai); color: #fff;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .followup-submit:hover { background: var(--ai-dark); }
    .followup-thanks { font-size: 12px; color: var(--success); font-weight: 600; display: none; margin-top: 8px; }
    .followup-thanks.visible { display: block; }

    /* ── Scrollable body ── */
    .phone-body { padding: 12px 16px 36px; max-height: 620px; overflow-y: auto; }

    /* Section header */
    .section-header {
      font-size: 16px; font-weight: 700; color: var(--primary); padding: 12px 0 8px;
    }

    /* Score card */
    .score-card {
      background: var(--paper); border-radius: 12px;
      padding: 16px; margin-bottom: 12px;
    }

    /* Qualification section sub-header */
    .qual-section-header {
      font-size: 14px; font-weight: 700; color: var(--informational);
      margin: 14px 0 10px; padding-top: 12px; border-top: 1px solid var(--grey200);
    }

    /* Individual qualification row — binary only */
    .qual-row { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .qual-row-name { font-size: 14px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .qual-outcome {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 14px;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .qual-outcome.met     { background: var(--success-light); color: var(--success-dark); }
    .qual-outcome.not-met { background: var(--error-light);   color: var(--error); }

    /* AI disclosure */
    .ai-disclosure {
      font-size: 11px; color: var(--text-disabled); text-align: center;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--grey200); line-height: 1.45;
    }

    /* Spacer between header and body when no summary card */
    .body-spacer { height: 12px; }

    /* ── Overview tab bar card (Figma 718:63816) ── */
    .tab-card {
      background: var(--paper);
      border-radius: 12px;
      overflow: hidden;
      margin: 8px 16px 0;
    }
    /* Tab row */
    .tab-row {
      display: flex; align-items: flex-end;
      padding: 0 8px;
      border-bottom: 1px solid var(--grey200);
      background: var(--paper);
    }
    .tab-item {
      padding: 14px 16px 12px;
      font-size: 14px; font-weight: 400;
      color: rgba(0,0,0,0.6);
      cursor: pointer; position: relative;
      white-space: nowrap; letter-spacing: 0.25px;
      border: none; background: none; font-family: inherit;
      line-height: 1.43;
    }
    .tab-item.active {
      font-weight: 600; color: var(--primary);
    }
    .tab-item.active::after {
      content: ''; position: absolute;
      bottom: -1px; left: 0; right: 0; height: 2px;
      background: var(--primary);
    }
    .tab-action {
      margin-left: auto; display: flex; align-items: center;
      padding: 0 8px 10px;
    }
    /* Figma 344:47625 — outlined ghost button, border rgba(0,0,0,0.26), p-6, rounded-4 */
    .tab-action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 5px; border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.26); background: transparent;
      cursor: pointer; flex-shrink: 0;
    }
    /* Overview content grid */
    .tab-content {
      padding: 12px 16px 16px;
    }
    .overview-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    .overview-row-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px;
      font-size: 14px; color: var(--text-primary);
      letter-spacing: 0.25px; line-height: 1.43;
    }
    .overview-row-item svg { flex-shrink: 0; color: var(--text-secondary); }

    /* ── Score Detail v2 card (Figma 799:188018) ── */
    .score-detail-v2 {
      background: var(--paper);
      border-radius: 12px;
      overflow: hidden;
      margin: 8px 16px 0;
    }
    /* Header row: "Score Detail" blue title + triangle */
    .sd2-header {
      padding: 18px 16px;
    }
    .sd2-title {
      font-size: 16px; font-weight: 600; color: var(--info);
      letter-spacing: 0.4px; line-height: 1.2; padding: 0 8px;
    }
    .sd2-triangle-wrap { padding: 0 0 8px; }
    .sd2-triangle {
      width: 100%; height: 18px; position: relative;
    }
    .sd2-triangle::before {
      content: ''; position: absolute; inset: 0;
      background: var(--ai);
      clip-path: polygon(0% 100%, 100% 0%, 100% 100%);
    }
    /* Section block */
    .sd2-section {
      padding: 8px 16px;
    }
    .sd2-section-header {
      font-size: 14px; font-weight: 600; color: var(--ai);
      letter-spacing: 0.4px; line-height: 1.2; padding: 0 8px;
      margin-bottom: 0;
    }
    /* Each qual row: pl-16 pr-8 py-8 */
    .sd2-qual-row {
      padding: 8px 8px 8px 16px;
    }
    .sd2-qual-name {
      font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.67);
      letter-spacing: 0.4px; line-height: 1.4; display: block;
    }
    .sd2-qual-evidence {
      font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.67);
      letter-spacing: 0.4px; line-height: 1.4; display: block;
    }
    .sd2-disclosure {
      font-size: 11px; color: var(--text-disabled); text-align: center;
      padding: 10px 16px 16px; line-height: 1.45;
      border-top: 1px solid var(--grey200); margin: 0 16px;
    }

    @media (max-width: 1000px) {
      .phones-grid { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Application Score — 3 Summary Approaches</h1>
  <p>Same candidate · same score · same binary qualifications. Only the AI summary changes across the three approaches.</p>
</div>

<div class="phones-grid" id="phones"></div>

<script>
const C = {
  name: 'Maria Gonzalez',
  score: 74,
  location: 'Chandler, AZ',
  required: [
    { name: '18 years or older',          met: true  },
    { name: 'Overnight shift availability',met: true  },
    { name: 'Lift up to 50 lbs',          met: true  },
  ],
  preferred: [
    { name: 'Warehouse/stocking experience',       met: false },
    { name: 'Operate pallet jacks / hand trucks',  met: true  },
    { name: 'Work in freezer/cooler environments', met: true  },
  ],
};

// ── SVGs ──
const svg = {
  check: (s=13) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  x:     (s=13) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  // MUI AutoAwesome — matches Figma Sparkles (node 718:88384), filled #775FEC
  spark: (s=24) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="#775FEC" xmlns="http://www.w3.org/2000/svg"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9z"/><path d="M11.5 9.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5z"/><path d="M19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>`,
  thumbUp:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`,
  thumbDown: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>`,
  phone:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
  mail:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
  pin:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  globe:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  calendar: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
};

function dotMeter(filled, total=5) {
  let h = '';
  for (let i = 0; i < total; i++) h += `<div class="dot ${i < filled ? 'filled' : 'empty'}"></div>`;
  return `<div class="dot-meter">${h}</div>`;
}

            <path d="M15 18L9 12L15 6" stroke="rgba(0,0,0,0.87)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="breadcrumb-nav-count">1/20</span>
        <button class="breadcrumb-nav-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M9 18L15 12L9 6" stroke="rgba(0,0,0,0.87)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>`;
}

// SVG icons matching Figma spec
const clockSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
const mailSvg16 = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
const phoneSvg16 = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;

// profileHeader(opts) — opts.padBottom: adds white padding below triangle (conservative)
//                        opts.fusedContent: HTML to fuse inside the card after triangle
function profileHeader({ padBottom = false, fusedContent = '' } = {}) {
  return `
    <div class="profile-header">
      <div class="profile-header-top">
        <div class="profile-name">${C.name}</div>
      </div>
      <div class="profile-header-bottom${padBottom ? ' has-padding' : ''}">
        <div class="profile-chip-row">
          <div class="profile-chip-wrap">
            <span class="profile-stage-chip">Interview</span>
          </div>
          <span class="profile-time-badge">${clockSvg} 3 days</span>
        </div>
        <div class="profile-contact-row">
          <div class="profile-contact-item flex-1">
            ${mailSvg16}<span>mgonzalez@gmail.com</span>
          </div>
          <div class="profile-contact-item fixed">
            ${phoneSvg16}<span>(480) 555-0192</span>
          </div>
        </div>
        <div class="profile-score-triangle-wrap">
          <div class="profile-score-triangle"></div>
        </div>
        ${fusedContent}
      </div>
    </div>`;
}

// ── Binary qual rows (shared across all 3) ──
function qualRows(list) {
  return list.map(q => `
    <div class="qual-row">
      <span class="qual-row-name">${q.name}</span>
      <span class="qual-outcome ${q.met ? 'met' : 'not-met'}">
        ${q.met ? svg.check() : svg.x()} ${q.met ? 'Met' : 'Not met'}
      </span>
    </div>`).join('');
}

function scoreDetail() {
  return `
    <div class="phone-body">
      <div class="section-header">Score Detail</div>
      <div class="score-card">
        <div class="qual-section-header" style="margin-top:0;padding-top:0;border-top:none">Required qualifications</div>
        ${qualRows(C.required)}
        <div class="qual-section-header">Preferred qualifications</div>
        ${qualRows(C.preferred)}
        <div class="ai-disclosure">
          Score is calculated from screening question responses only. It does not consider resume, demographics, or protected characteristics.
        </div>
      </div>
    </div>`;
}

// ── Feedback interaction (unique id per phone) ──
function feedbackBlock(id) {
  return `
    <div class="feedback-row">
      <span class="feedback-label">Was this helpful?</span>
      <button class="fb-btn" id="up-${id}" onclick="handleFeedback('${id}','up')">${svg.thumbUp}</button>
      <button class="fb-btn" id="dn-${id}" onclick="handleFeedback('${id}','down')">${svg.thumbDown}</button>
    </div>
    <div class="feedback-followup" id="followup-${id}">
      <p id="comment-label-${id}">Add a comment (optional)</p>
      <textarea class="followup-comment" id="comment-${id}" rows="2" placeholder="What could be improved?"></textarea>
      <button class="followup-submit" id="submit-${id}" onclick="submitFeedback('${id}')">Submit</button>
      <div class="followup-thanks" id="thanks-${id}">Thanks — your feedback was recorded.</div>
    </div>`;
}

// ── Summary card wrapper — fused=true removes outer margin and merges with header ──
function summaryCard(id, text, fused = false) {
  return `
    <div class="ai-summary-card${fused ? ' fused' : ''}">
      <div class="spark-col">${svg.spark()}</div>
      <div class="summary-body">
        <div class="summary-text">${text}</div>
        ${feedbackBlock(id)}
      </div>
    </div>`;
}

// ── Approach 1: Conservative — no summary, white pad below triangle ──
function conservative() {
  return `
    <div class="phone">
      ${phoneChrome()}
      ${profileHeader({ padBottom: true })}
      ${tabBar()}
      <div class="body-spacer"></div>
      ${scoreDetail()}
    </div>`;
}

// ── Approach 2: Medium — summary fused inside header card ──
function medium() {
  const text = `Experience operating pallet jacks and hand trucks. Available for overnight shifts and work in refrigerated areas. Pay expectation aligns with the posted range. <strong>No documented experience in warehouse stocking or replenishment.</strong>`;
  return `
    <div class="phone">
      ${phoneChrome()}
      ${profileHeader({ fusedContent: summaryCard('med', text, true) })}
      ${tabBar()}
      <div class="body-spacer"></div>
      ${scoreDetail()}
    </div>`;
}

// ── Approach 3: Maximum — summary fused inside header card ──
function maximum() {
  const text = `Meets all required qualifications and has hands-on warehouse equipment experience that supports a fast ramp. <strong>No stocking or replenishment background</strong> — expect an initial learning curve. <strong>Recent job turnover</strong> — two roles in 18 months — may be a retention risk for overnight operations. Pay expectation aligns with the posted range.`;
  return `
    <div class="phone">
      ${phoneChrome()}
      ${profileHeader({ fusedContent: summaryCard('max', text, true) })}
      ${tabBar()}
      <div class="body-spacer"></div>
      ${scoreDetail()}
    </div>`;
}

// ── Interaction handlers ──
window.handleFeedback = function(id, dir) {
  const up = document.getElementById(`up-${id}`);
  const dn = document.getElementById(`dn-${id}`);
  const followup = document.getElementById(`followup-${id}`);
  const thanks = document.getElementById(`thanks-${id}`);

  up.classList.remove('active-up', 'active-down');
  dn.classList.remove('active-up', 'active-down');

  if (dir === 'up') up.classList.add('active-up');
  else dn.classList.add('active-down');

  // Reset followup state — restore comment form, clear previous input
  thanks.classList.remove('visible');
  const label  = document.getElementById(`comment-label-${id}`);
  const comment = document.getElementById(`comment-${id}`);
  const submit  = document.getElementById(`submit-${id}`);
  label.style.display  = '';
  comment.style.display = '';
  comment.value = '';
  submit.style.display  = '';

  followup.classList.add('visible');
};

window.submitFeedback = function(id) {
  document.getElementById(`comment-label-${id}`).style.display = 'none';
  document.getElementById(`comment-${id}`).style.display = 'none';
  document.getElementById(`submit-${id}`).style.display = 'none';
  document.getElementById(`thanks-${id}`).classList.add('visible');
};

// ── Score Detail v2 — Figma 799:188018: name + evidence rows, purple section headers ──
const C2 = {
  required: [
    { name: 'Overnight shift availability',  evidence: 'Confirmed available Sun–Thu, 10pm–6am' },
    { name: 'Lift up to 50 lbs',             evidence: 'Self-confirmed, no restrictions noted' },
    { name: '18 years or older',             evidence: 'DOB on file, verified eligible' },
  ],
  preferred: [
    { name: 'Warehouse / stocking experience', evidence: 'No prior experience documented' },
    { name: 'Operate pallet jacks / hand trucks', evidence: 'Experience at previous distribution role' },
    { name: 'Work in freezer/cooler environments', evidence: 'Confirmed comfortable, no health restrictions' },
  ],
};

function scoreDetailV2() {
  const reqRows = C2.required.map(q => `
    <div class="sd2-qual-row">
      <span class="sd2-qual-name">${q.name}</span>
      <span class="sd2-qual-evidence">${q.evidence}</span>
    </div>`).join('');
  const prefRows = C2.preferred.map(q => `
    <div class="sd2-qual-row">
      <span class="sd2-qual-name">${q.name}</span>
      <span class="sd2-qual-evidence">${q.evidence}</span>
    </div>`).join('');
  return `
    <div class="score-detail-v2">
      <div class="sd2-header">
        <div class="sd2-title">Score Detail</div>
      </div>
      <div style="padding: 0 16px 8px;">
        <div class="sd2-triangle-wrap">
          <div class="sd2-triangle"></div>
        </div>
      </div>
      <div class="sd2-section">
        <div class="sd2-section-header">Required qualification</div>
        ${reqRows}
      </div>
      <div class="sd2-section">
        <div class="sd2-section-header">Preferred qualification</div>
        ${prefRows}
      </div>
      <div class="sd2-disclosure">
        Score is calculated from screening question responses only. It does not consider resume, demographics, or protected characteristics.
      </div>
    </div>`;
}

// ── Approach 4: Exploration — medium summary + v2 score detail ──
function exploration() {
  const text = `Experience operating pallet jacks and hand trucks. Available for overnight shifts and work in refrigerated areas. Pay expectation aligns with the posted range. <strong>No documented experience in warehouse stocking or replenishment.</strong>`;
  return `
    <div class="phone">
      ${phoneChrome()}
      ${profileHeader({ fusedContent: summaryCard('exp', text, true) })}
      ${tabBar()}
      <div class="body-spacer"></div>
      ${scoreDetailV2()}
      <div style="height:36px"></div>
    </div>`;
}

// ── Render ──
const approaches = [
  {
    tag: 'conservative', label: 'Conservador',
    note: '<strong>No summary.</strong> The dot meter in the header is the only score signal. Score Detail is the complete source of truth.',
    fn: conservative
  },
  {
    tag: 'medium', label: 'Medio',
    note: '<strong>Factual summary</strong> based on screening responses only. No inferences or editorial judgment. Feedback thumbs below the summary.',
    fn: medium
  },
  {
    tag: 'maximum', label: 'Máximo',
    note: '<strong>Summary with judgment and inferences</strong>: stocking gap, retention risk, salary alignment. Feedback thumbs below the summary.',
    fn: maximum
  },
  {
    tag: 'exploration', label: 'Exploration',
    note: '<strong>Medium summary + expanded Score Detail</strong>: each qualification shows the name and the evidence or answer that drove it, matching the new Figma card design.',
    fn: exploration
  },
];

document.getElementById('phones').innerHTML = approaches.map(a => `
  <div class="phone-wrapper">
    <div class="phone-label-block">
      <div><span class="approach-tag ${a.tag}">${a.tag}</span></div>
      <div class="phone-label">${a.label}</div>
    </div>
    ${a.fn()}
    <div class="phone-note">${a.note}</div>
  </div>
`).join('');
</script>
